<svg xmlns="http://www.w3.org/2000/svg" width="780" height="180" viewBox="0 0 780 180" role="img" aria-label="Construtask">
  <defs>
    <linearGradient id="metal" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#f4f4f5"/>
      <stop offset="35%" stop-color="#b8bcc2"/>
      <stop offset="65%" stop-color="#6e757e"/>
      <stop offset="100%" stop-color="#d9dde2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="780" height="180" fill="none"/>
  <text x="390" y="90" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="92" font-weight="900" letter-spacing="2" fill="url(#metal)" filter="url(#shadow)">CONSTRUTASK</text>
  <text x="390" y="130" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="700" fill="#f3dada">Consultoria em Gestão de Projetos</text>
  <text x="390" y="160" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="25" font-weight="700" fill="#f3dada">de Construção Civil</text>
</svg>
